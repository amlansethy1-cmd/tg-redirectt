<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Gateway Protocol</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
/* =========================================================
   ELITE UX/UI DESIGN BY SENIOR ARCHITECT
   Theme: Cyber-Glass & Deep Neon
========================================================= */
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
:root {
  --bg-dark: #09090b;
  --surface: rgba(24, 24, 27, 0.6);
  --primary: #00f0ff;    /* Cyber Cyan */
  --secondary: #7000ff;  /* Deep Purple */
  --success: #00ff88;    /* Neon Green */
  --text-main: #ffffff;
  --text-muted: #a1a1aa;
}

body {
  background-color: var(--bg-dark);
  color: var(--text-main);
  height: 100vh; width: 100vw;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  overflow: hidden;
  position: relative;
}

/* --- ANIMATED BACKGROUND --- */
.bg-grid {
  position: absolute; inset: 0; z-index: 0;
  background-size: 40px 40px;
  background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
                    linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
  mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
  -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
}
.glow-orb {
  position: absolute; width: 300px; height: 300px; border-radius: 50%;
  filter: blur(80px); opacity: 0.4; z-index: 1;
  animation: float 8s infinite alternate ease-in-out;
}
.orb-1 { background: var(--primary); top: -100px; left: -100px; }
.orb-2 { background: var(--secondary); bottom: -100px; right: -100px; animation-delay: -4s; }

@keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(40px, 40px); } }

/* --- MAIN CONTAINER --- */
.container {
  position: relative; z-index: 10;
  width: min(90%, 400px);
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 28px;
  padding: 32px 24px;
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
  animation: slideUp 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
}
@keyframes slideUp { 0% { opacity: 0; transform: translateY(40px) scale(0.95); } 100% { opacity: 1; transform: translateY(0) scale(1); } }

/* --- HEADER & ICONS --- */
.shield-icon {
  width: 64px; height: 64px; margin: 0 auto 20px;
  background: linear-gradient(135deg, rgba(0,240,255,0.2), rgba(112,0,255,0.2));
  border: 1px solid rgba(0,240,255,0.3);
  border-radius: 20px; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 20px rgba(0,240,255,0.2);
  animation: pulseGlow 2s infinite;
}
@keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 15px rgba(0,240,255,0.2); } 50% { box-shadow: 0 0 30px rgba(0,240,255,0.5); } }

h1 { font-size: 24px; font-weight: 800; text-align: center; margin-bottom: 8px; letter-spacing: 0.5px; }
p.subtitle { text-align: center; font-size: 14px; color: var(--text-muted); line-height: 1.5; margin-bottom: 28px; }

/* --- ACTION BUTTONS --- */
.btn {
  width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
  padding: 16px; border-radius: 16px; border: none; font-size: 16px; font-weight: 600;
  cursor: pointer; transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
  position: relative; overflow: hidden;
}
.btn:active { transform: scale(0.96); }

/* The Hero Button */
.btn-copy {
  background: linear-gradient(90deg, var(--secondary), var(--primary), var(--secondary));
  background-size: 200% auto;
  color: #000; font-weight: 800;
  box-shadow: 0 10px 25px rgba(0,240,255,0.3);
  margin-bottom: 16px;
  animation: gradientFlow 3s linear infinite;
}
@keyframes gradientFlow { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }

.btn-copy.success {
  background: var(--success); box-shadow: 0 10px 25px rgba(0,255,136,0.3); animation: none; color: #000;
}

/* Secondary Button */
.btn-outline {
  background: transparent; color: var(--text-main);
  border: 1px solid rgba(255,255,255,0.15);
}
.btn-outline:hover { background: rgba(255,255,255,0.05); }

/* --- STEP INSTRUCTIONS --- */
.steps-box {
  margin-top: 24px; padding: 16px; border-radius: 16px;
  background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05);
}
.step { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.step:last-child { margin-bottom: 0; }
.step-num { 
  display: flex; align-items: center; justify-content: center; 
  width: 24px; height: 24px; border-radius: 50%; 
  background: rgba(255,255,255,0.1); font-size: 12px; font-weight: 800; color: var(--primary); 
}
.step-text { font-size: 13px; color: var(--text-muted); }
.step-text span { color: var(--text-main); font-weight: 600; }

/* --- TOAST NOTIFICATION --- */
.toast {
  position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
  background: var(--success); color: #000; font-weight: 700; font-size: 14px;
  padding: 12px 24px; border-radius: 50px; z-index: 100;
  box-shadow: 0 10px 30px rgba(0,255,136,0.4);
  display: flex; align-items: center; gap: 8px;
  transition: top 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.toast.show { top: 40px; }

</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="glow-orb orb-1"></div>
<div class="glow-orb orb-2"></div>

<div class="toast" id="toast">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
  Link Copied Successfully!
</div>

<div class="container">
  <div class="shield-icon">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#00f0ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
    </svg>
  </div>
  
  <h1>Bypass Telegram Guard</h1>
  <p class="subtitle">Telegram blocks ad-links. Use an external browser to continue seamlessly.</p>

  <button class="btn btn-copy" id="copyBtn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
    COPY SECURE LINK
  </button>

  <button class="btn btn-outline" id="openBtn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
    Try Direct Open
  </button>

  <div class="steps-box">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-text">Tap the <span>Copy Secure Link</span> button</div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-text">Open <span>Chrome</span> or <span>Safari</span> on your phone</div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-text"><span>Paste</span> the link in the search bar and GO!</div>
    </div>
  </div>
</div>

<script>
  // 1. Initialize Telegram WebApp API safely
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  // 2. Safely grab and decode the target URL
  const params = new URLSearchParams(window.location.search);
  const rawUrl = params.get('u');
  let targetUrl = "";

  if (rawUrl) {
    try {
      targetUrl = decodeURIComponent(rawUrl);
      if (!targetUrl.startsWith('http')) { targetUrl = 'https://' + targetUrl; }
    } catch(e) {
      targetUrl = "";
    }
  }

  // Fallback UI if URL is missing
  if (!targetUrl) {
    document.querySelector('.subtitle').innerHTML = "<span style='color:#ff3c3c'>❌ Error: Link is broken or missing. Return to bot.</span>";
    document.getElementById('copyBtn').style.display = "none";
    document.getElementById('openBtn').style.display = "none";
    document.querySelector('.steps-box').style.display = "none";
  }

  // --- CORE UX FUNCTION: COPY TO CLIPBOARD ---
  const copyBtn = document.getElementById('copyBtn');
  const toast = document.getElementById('toast');

  copyBtn.addEventListener('click', () => {
    // Advanced clipboard method for mobile compatibility
    const copyToClipboard = async () => {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(targetUrl);
        } else {
          // Fallback for older WebViews
          let textArea = document.createElement("textarea");
          textArea.value = targetUrl;
          textArea.style.position = "fixed";
          textArea.style.left = "-999999px";
          textArea.style.top = "-999999px";
          document.body.appendChild(textArea);
          textArea.focus();
          textArea.select();
          document.execCommand('copy');
          textArea.remove();
        }
        
        // Success UX Feedback
        if (navigator.vibrate) navigator.vibrate([30, 50, 30]); // Haptic feedback
        
        copyBtn.classList.add("success");
        copyBtn.innerHTML = "✅ COPIED! PASTE IN CHROME";
        
        toast.classList.add("show");
        
        setTimeout(() => {
          copyBtn.classList.remove("success");
          copyBtn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> COPY SECURE LINK`;
          toast.classList.remove("show");
        }, 3000);

      } catch (err) {
        alert("Could not copy. Please try the 'Direct Open' button.");
      }
    };
    
    copyToClipboard();
  });

  // --- SECONDARY UX FUNCTION: DIRECT OPEN ---
  const openBtn = document.getElementById('openBtn');
  openBtn.addEventListener('click', () => {
    try {
      tg.openLink(targetUrl);
    } catch(e) {
      window.open(targetUrl, '_blank');
    }
  });

</script>
</body>
</html>
