<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Secure Verification</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* =========================================================
   PREMIUM ENTERPRISE UI/UX BY SENIOR ARCHITECT
   Theme: Midnight Minimalist (Apple/Stripe inspired)
========================================================= */
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }

:root {
  --bg-dark: #000000;
  --card-bg: rgba(24, 24, 27, 0.65);
  --text-main: #ffffff;
  --text-muted: #8a8a93;
  --border-subtle: rgba(255, 255, 255, 0.1);
  --border-highlight: rgba(255, 255, 255, 0.2);
  --primary-btn: #ffffff;
  --primary-text: #000000;
}

body {
  background-color: var(--bg-dark); color: var(--text-main);
  height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative;
}

/* --- AMBIENT SUBTLE GLOW --- */
.ambient-bg {
  position: absolute; width: 600px; height: 600px; border-radius: 50%;
  background: radial-gradient(circle, rgba(58, 63, 255, 0.15) 0%, rgba(0,0,0,0) 70%);
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  filter: blur(60px); z-index: 0; animation: breathe 8s ease-in-out infinite alternate;
}
@keyframes breathe { 0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.8; } 100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; } }

/* --- PREMIUM CARD --- */
.card {
  position: relative; z-index: 10; width: min(90%, 360px);
  background: var(--card-bg); border: 1px solid var(--border-subtle);
  border-radius: 24px; padding: 36px 24px; text-align: center;
  backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
  box-shadow: 0 24px 48px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
  animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
}
@keyframes fadeUp { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }

/* --- ICONS & TYPOGRAPHY --- */
.icon-container {
  width: 56px; height: 56px; margin: 0 auto 24px; border-radius: 16px;
  background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.02) 100%);
  border: 1px solid var(--border-subtle); display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 16px rgba(0,0,0,0.3);
}
.icon-container svg { color: #fff; }

h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.03em; }
p.desc { font-size: 14px; color: var(--text-muted); line-height: 1.5; margin-bottom: 32px; font-weight: 400; padding: 0 10px; }

/* --- PREMIUM BUTTONS --- */
.btn {
  width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 14px 16px; border-radius: 14px; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94); border: none; outline: none;
}
.btn:active { transform: scale(0.97); }

/* The Hero Copy Button (White/Black high contrast) */
.btn-primary {
  background: var(--primary-btn); color: var(--primary-text);
  box-shadow: 0 4px 14px rgba(255,255,255,0.15); margin-bottom: 12px;
}
.btn-primary:hover { background: #f0f0f0; }

.btn-primary.success {
  background: #34c759; color: white; /* Apple native green */
  box-shadow: 0 4px 14px rgba(52, 199, 89, 0.3);
}

/* Secondary Action */
.btn-secondary {
  background: transparent; color: var(--text-muted);
  border: 1px solid transparent; font-size: 14px; font-weight: 500;
}
.btn-secondary:hover { color: var(--text-main); }

/* --- TOAST NOTIFICATION --- */
.toast {
  position: fixed; top: -60px; left: 50%; transform: translateX(-50%);
  background: rgba(30, 30, 32, 0.9); color: #fff; font-weight: 500; font-size: 13px;
  padding: 10px 20px; border-radius: 100px; border: 1px solid var(--border-highlight);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  display: flex; align-items: center; gap: 8px; z-index: 100;
  transition: top 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.toast.show { top: 40px; }

</style>
</head>
<body>

<div class="ambient-bg"></div>

<div class="toast" id="toast">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#34c759" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
  Link copied to clipboard
</div>

<div class="card" id="mainCard">
  <div class="icon-container">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
  </div>
  
  <h1>Secure Verification</h1>
  <p class="desc" id="descText">To continue, please copy your secure link and paste it into your device's browser.</p>

  <button class="btn btn-primary" id="copyBtn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
    Copy Secure Link
  </button>

  <button class="btn btn-secondary" id="openBtn">
    Open Directly (May be blocked)
  </button>
</div>

<script>
  // 1. Initialize Telegram WebApp
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  // Telegram native haptic feedback support (Super Premium feel)
  const haptic = tg.HapticFeedback;

  // 2. Decode URL safely
  const params = new URLSearchParams(window.location.search);
  const rawUrl = params.get('u');
  let targetUrl = "";

  if (rawUrl) {
    try {
      targetUrl = decodeURIComponent(rawUrl);
      if (!targetUrl.startsWith('http')) { targetUrl = 'https://' + targetUrl; }
    } catch(e) {
      targetUrl = "";
    }
  }

  // Handle Missing URL gracefully
  if (!targetUrl) {
    document.getElementById('descText').innerHTML = "Invalid link. Please generate a new one from the bot.";
    document.getElementById('descText').style.color = "#ff453a"; // Apple red
    document.getElementById('copyBtn').style.display = "none";
    document.getElementById('openBtn').style.display = "none";
  }

  // --- PREMIUM COPY INTERACTION ---
  const copyBtn = document.getElementById('copyBtn');
  const toast = document.getElementById('toast');

  copyBtn.addEventListener('click', () => {
    
    // Copy Logic
    const copyToClipboard = async () => {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(targetUrl);
        } else {
          let textArea = document.createElement("textarea");
          textArea.value = targetUrl;
          textArea.style.position = "fixed";
          textArea.style.opacity = "0";
          document.body.appendChild(textArea);
          textArea.focus();
          textArea.select();
          document.execCommand('copy');
          textArea.remove();
        }
        
        // Haptic Feedback (Uses Telegram's native engine if available)
        if (haptic) { haptic.impactOccurred('medium'); } 
        else if (navigator.vibrate) { navigator.vibrate(40); }
        
        // UI Change
        copyBtn.classList.add("success");
        copyBtn.innerHTML = "Copied! Paste in Safari/Chrome";
        toast.classList.add("show");
        
        // Reset after 4 seconds
        setTimeout(() => {
          copyBtn.classList.remove("success");
          copyBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> Copy Secure Link`;
          toast.classList.remove("show");
        }, 4000);

      } catch (err) {
        alert("Failed to copy. Please use the Direct Open button.");
      }
    };
    
    copyToClipboard();
  });

  // --- SECONDARY OPEN INTERACTION ---
  const openBtn = document.getElementById('openBtn');
  openBtn.addEventListener('click', () => {
    if (haptic) haptic.impactOccurred('light');
    try {
      tg.openLink(targetUrl);
    } catch(e) {
      window.open(targetUrl, '_blank');
    }
  });

</script>
</body>
</html>
