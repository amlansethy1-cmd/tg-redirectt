<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Gateway</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* 👑 PREMIUM UI/UX DESIGN BY ELITE ARCHITECT */
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --primary: #ff3c3c;
  --secondary: #ff7c3c;
  --success: #10b981;
  --bg: #06060e;
  --glass: rgba(255, 255, 255, 0.04);
  --glass-border: rgba(255, 255, 255, 0.08);
}
body{
  background-color: var(--bg);
  font-family: 'Inter', sans-serif;
  height: 100vh;
  width: 100vw;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  overflow: hidden;
}

/* BACKGROUND EFFECTS */
.bg-mesh {
  position: absolute; inset: 0; z-index: 0;
  background: 
    radial-gradient(circle at 20% 30%, rgba(255, 60, 60, 0.15) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(255, 124, 60, 0.1) 0%, transparent 50%);
  filter: blur(40px);
}

/* MAIN CARD */
.card {
  position: relative; z-index: 5;
  width: min(380px, 90vw);
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  padding: 40px 24px;
  text-align: center;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
  animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes fadeUp {
  0% { opacity: 0; transform: translateY(20px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* TYPOGRAPHY */
.icon { font-size: 48px; margin-bottom: 16px; display: inline-block; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

h1 { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.5px; }
p.desc { font-size: 14px; color: rgba(255,255,255,0.6); line-height: 1.5; margin-bottom: 30px; font-weight: 400; }

/* BUTTONS */
.btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 16px; border-radius: 14px;
  font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700;
  cursor: pointer; transition: all 0.2s ease; border: none; outline: none;
}
.btn:active { transform: scale(0.97); }

.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: white; margin-bottom: 12px;
  box-shadow: 0 8px 20px rgba(255, 60, 60, 0.25);
}
.btn-primary.success {
  background: var(--success);
  box-shadow: 0 8px 20px rgba(16, 185, 129, 0.25);
}

.btn-secondary {
  background: rgba(255,255,255,0.05); color: #fff;
  border: 1px solid rgba(255,255,255,0.1);
}
.btn-secondary:hover { background: rgba(255,255,255,0.1); }

/* WARNING BOX */
.alert-box {
  margin-top: 24px; padding: 12px; border-radius: 12px;
  background: rgba(255, 210, 60, 0.1); border: 1px solid rgba(255, 210, 60, 0.2);
  font-size: 12px; color: rgba(255, 210, 60, 0.9); line-height: 1.5; text-align: left;
}
.alert-box strong { color: #ffd23c; }

</style>
</head>
<body>

<div class="bg-mesh"></div>

<div class="card" id="mainCard">
  <div class="icon">🔗</div>
  <h1>Action Required</h1>
  <p class="desc">Telegram's internal browser blocks verification. Please copy your link and open it in <b>Chrome</b> or <b>Safari</b>.</p>

  <button class="btn btn-primary" id="copyBtn">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
    Copy Link
  </button>

  <button class="btn btn-secondary" id="openBtn">
    🌐 Try Opening Directly
  </button>

  <div class="alert-box">
    <strong>💡 Quick Tip:</strong> After copying, minimize Telegram, open Google Chrome, paste the link in the search bar, and complete your verification.
  </div>
</div>

<script>
  // Initialize Telegram WebApp
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  // Extract Target URL
  const params = new URLSearchParams(window.location.search);
  const rawUrl = params.get('u');
  let targetUrl = "";

  if (rawUrl) {
    targetUrl = decodeURIComponent(rawUrl);
    if (!targetUrl.startsWith('http')) { targetUrl = 'https://' + targetUrl; }
  } else {
    document.querySelector('.desc').innerHTML = "❌ No link found. Please go back and try again.";
    document.getElementById('copyBtn').style.display = "none";
    document.getElementById('openBtn').style.display = "none";
  }

  // --- COPY BUTTON LOGIC (The Foolproof Way) ---
  const copyBtn = document.getElementById('copyBtn');
  copyBtn.addEventListener('click', () => {
    
    // Create a temporary textarea to copy text (Works on all mobile devices)
    const tempInput = document.createElement("textarea");
    tempInput.value = targetUrl;
    document.body.appendChild(tempInput);
    tempInput.select();
    document.execCommand("copy");
    document.body.removeChild(tempInput);

    // UI Feedback
    copyBtn.classList.add("success");
    copyBtn.innerHTML = "✅ Copied! Now paste in Chrome";
    
    // Vibrate phone if supported
    if (navigator.vibrate) { navigator.vibrate(50); }

    // Revert button after 3 seconds
    setTimeout(() => {
      copyBtn.classList.remove("success");
      copyBtn.innerHTML = `<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> Copy Link Again`;
    }, 3000);
  });

  // --- OPEN DIRECTLY LOGIC (The Fallback) ---
  const openBtn = document.getElementById('openBtn');
  openBtn.addEventListener('click', () => {
    try {
      // Official Telegram method
      tg.openLink(targetUrl);
    } catch(e) {
      window.open(targetUrl, '_blank');
    }
  });

</script>
</body>
</html>
