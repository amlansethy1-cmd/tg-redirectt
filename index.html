<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Opening...</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080810;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .grain {
      position: fixed; inset: 0; pointer-events: none; z-index: 10;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.4;
    }
    .bg-orb {
      position: fixed; border-radius: 50%;
      filter: blur(80px); opacity: 0.15;
      animation: drift 8s ease-in-out infinite alternate;
    }
    .orb1 { width: 400px; height: 400px; background: #e50914; top: -100px; left: -100px; }
    .orb2 { width: 300px; height: 300px; background: #ff6b00; bottom: -80px; right: -80px; animation-delay: -4s; }
    @keyframes drift { from { transform: translate(0,0); } to { transform: translate(30px,20px); } }
    .container {
      text-align: center; z-index: 5; padding: 40px;
      animation: fadeUp 0.8s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .film-strip { display: flex; gap: 6px; justify-content: center; margin-bottom: 32px; opacity: 0.3; }
    .film-hole { width: 10px; height: 10px; border: 1.5px solid #fff; border-radius: 2px; }
    .icon-wrap { width: 80px; height: 80px; margin: 0 auto 24px; position: relative; }
    .icon-ring {
      position: absolute; inset: 0; border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.15);
      animation: spin 3s linear infinite;
    }
    .icon-ring::after {
      content: ''; position: absolute; top: -2px; left: 50%;
      width: 6px; height: 6px; background: #e50914;
      border-radius: 50%; transform: translateX(-50%);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .icon-inner {
      position: absolute; inset: 12px;
      background: rgba(229,9,20,0.15); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 28px;
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif; font-size: 42px;
      letter-spacing: 4px; margin: 0 0 8px;
      background: linear-gradient(135deg, #fff 40%, rgba(255,255,255,0.5));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    p { font-size: 14px; color: rgba(255,255,255,0.45); margin: 0 0 36px; font-weight: 300; letter-spacing: 0.5px; }
    .progress-wrap { width: 200px; height: 2px; background: rgba(255,255,255,0.08); border-radius: 2px; margin: 0 auto 16px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg,#e50914,#ff6b00); border-radius: 2px; animation: load 1.5s ease forwards; }
    @keyframes load { from { width: 0; } to { width: 100%; } }
    .status { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.25); }
    .dot { display: inline-block; animation: blink 1.2s ease infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }
    .brand { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.12); white-space: nowrap; }
  </style>
</head>
<body>
  <div class="grain"></div>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="container">
    <div class="film-strip">
      <div class="film-hole"></div><div class="film-hole"></div>
      <div class="film-hole"></div><div class="film-hole"></div>
      <div class="film-hole"></div><div class="film-hole"></div>
      <div class="film-hole"></div>
    </div>
    <div class="icon-wrap">
      <div class="icon-ring"></div>
      <div class="icon-inner">🎬</div>
    </div>
    <h1>Opening Link</h1>
    <p>Redirecting to your browser<br>Please wait a moment</p>
    <div class="progress-wrap"><div class="progress-bar"></div></div>
    <div class="status">Loading<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
  </div>
  <div class="brand">Cine Underground • AI × Movies</div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    const params = new URLSearchParams(window.location.search);
    const raw = params.get('u');
    if (raw) {
      const targetUrl = decodeURIComponent(raw);
      tg.openLink(targetUrl);
      setTimeout(() => tg.close(), 900);
    } else {
      document.querySelector('p').textContent = '❌ Invalid link.';
    }
  </script>
</body>
</html>
